<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games by pdehaye</title>
<meta name="description" content="A collection of logic puzzle games.">
<meta name="theme-color" content="#2B2420">
<link rel="canonical" href="https://pdehaye.github.io/games/">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #2B2420;
    color: #f0e6d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
    color: #f5d87a;
    text-align: center;
  }

  .tiles {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: center;
    max-width: 700px;
    width: 100%;
  }

  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    width: 240px;
    aspect-ratio: 1;
    background: #3d2f28;
    border: 2px solid #6b4c3b;
    border-radius: 1rem;
    text-decoration: none;
    color: #f0e6d0;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    padding: 1.5rem;
  }

  .tile:hover, .tile:focus-visible {
    border-color: #f5d87a;
    background: #4d3a30;
    transform: translateY(-3px);
    outline: none;
  }

  .tile .icon {
    font-size: 3.5rem;
    line-height: 1;
  }

  .tile .name {
    font-size: 1.25rem;
    font-weight: bold;
    letter-spacing: 0.04em;
    color: #f5d87a;
  }

  .tile .desc {
    font-size: 0.85rem;
    text-align: center;
    color: #c4a882;
    line-height: 1.4;
  }

  .tile.coming-soon {
    opacity: 0.6;
    cursor: default;
    pointer-events: none;
  }

  .badge {
    font-size: 0.7rem;
    background: #6b4c3b;
    color: #c4a882;
    border-radius: 0.4rem;
    padding: 0.15rem 0.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <h1>Games</h1>
  <div class="tiles" id="tileGrid"></div>
  <script type="module">
    import { GAMES } from './js/game-registry.js';
    const grid = document.getElementById('tileGrid');
    for (const game of GAMES) {
      const a = document.createElement('a');
      a.className = 'tile';
      a.href = game.path;
      a.innerHTML = `
        <span class="icon">${game.icon}</span>
        <span class="name">${game.label}</span>
        <span class="desc">${game.description}</span>`;
      grid.appendChild(a);
    }
  </script>
</body>
</html>
